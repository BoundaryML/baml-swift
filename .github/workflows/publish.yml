name: publish

# Publishes the Swift bridge from BoundaryML/baml@dhilan/swift-bridge-1.
# Dev channel: trigger moves to canary release tags when the canonical
# Phase 6 pipeline lands.
#
# Cadence: a cheap Linux poll compares the source branch head against
# SOURCE_SHA; the expensive macOS build runs only on change (or manual
# dispatch). Release assets are immutable — one tag per source SHA,
# never re-uploaded; main's Package.swift is the moving pointer.
#
# Caching, two layers:
#   1. If the release for this SHA already exists, the whole Rust
#      build is skipped — the published asset is downloaded and
#      checksummed instead (re-runs and stamp-only fixes cost ~2 min).
#   2. Swatinem/rust-cache shares dependency compilation across SHAs.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      source_sha:
        description: "BoundaryML/baml commit to build (default: branch head)"
        required: false

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

env:
  SOURCE_REPO: BoundaryML/baml
  SOURCE_BRANCH: dhilan/swift-bridge-1

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      changed: ${{ steps.resolve.outputs.changed }}
      tag: ${{ steps.resolve.outputs.tag }}
      zip: ${{ steps.resolve.outputs.zip }}
      version: ${{ steps.resolve.outputs.version }}
      short: ${{ steps.resolve.outputs.short }}
      have_release: ${{ steps.resolve.outputs.have_release }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SHA" ]; then
            sha="$INPUT_SHA"
          else
            sha="$(gh api "repos/$SOURCE_REPO/commits/$SOURCE_BRANCH" --jq .sha)"
          fi
          current="$(cat SOURCE_SHA 2>/dev/null || echo none)"
          # Tag is computable without a checkout: one API read of
          # release.toml at the source SHA.
          version="$(gh api "repos/$SOURCE_REPO/contents/baml_language/release.toml?ref=$sha" \
            --jq .content | base64 -d | sed -n 's/^canary_version = "\(.*\)"/\1/p')"
          [ -n "$version" ] || { echo "::error::could not read canary_version"; exit 1; }
          short="${sha:0:12}"
          tag="dev-${version}-${short}"
          zip="BamlBridgeFFI-${tag}.xcframework.zip"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            have_release=true
          else
            have_release=false
          fi
          {
            echo "sha=$sha"
            echo "version=$version"
            echo "short=$short"
            echo "tag=$tag"
            echo "zip=$zip"
            echo "have_release=$have_release"
          } >> "$GITHUB_OUTPUT"
          if [ "$sha" = "$current" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "up to date at $sha"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "will publish $tag (release exists: $have_release)"
          fi

  publish:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: macos-15
    env:
      TAG: ${{ needs.check.outputs.tag }}
      ZIP: ${{ needs.check.outputs.zip }}
    steps:
      - name: Checkout dist repo
        uses: actions/checkout@v4
        with:
          path: dist

      - name: Checkout monorepo at source SHA
        uses: actions/checkout@v4
        with:
          repository: BoundaryML/baml
          ref: ${{ needs.check.outputs.sha }}
          path: monorepo

      # ----- build path: only when this SHA has no published release -----

      - name: Rust toolchain
        if: needs.check.outputs.have_release != 'true'
        # Runs inside the monorepo so rustup auto-installs the pinned
        # toolchain; cross-target provisioning and deployment-target
        # pins live in build-xcframework.sh itself (build knowledge
        # stays in the monorepo).
        working-directory: monorepo/baml_language
        run: rustup show active-toolchain

      - name: Rust cache
        if: needs.check.outputs.have_release != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: monorepo/baml_language
          key: xcframework-all

      - name: Build + package XCFramework (all slices)
        if: needs.check.outputs.have_release != 'true'
        run: |
          monorepo/baml_language/sdks/swift/scripts/build-xcframework.sh \
            --all --zip "$GITHUB_WORKSPACE/$ZIP"

      - name: Create immutable release
        if: needs.check.outputs.have_release != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$TAG" "$ZIP" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "Built from ${SOURCE_REPO}@${{ needs.check.outputs.sha }} (branch ${SOURCE_BRANCH}, canonical version ${{ needs.check.outputs.version }}). Regenerate your app's SDK from this exact commit (see README: version handshake)."

      # ----- reuse path: the published asset is the canonical artifact -----

      - name: Download published asset
        if: needs.check.outputs.have_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "release $TAG exists — reusing its published asset (build skipped)"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.zip' --output "$ZIP"

      # ----- common tail -----

      - name: Checksum the canonical asset
        id: checksum
        # Always checksums the bytes consumers will download: the fresh
        # zip on the build path (just uploaded, hence canonical), the
        # downloaded asset on the reuse path. Rebuilds are not
        # byte-reproducible, so never checksum a rebuild of an
        # already-published tag.
        run: |
          set -euo pipefail
          CHECKSUM="$(cd monorepo/baml_language/sdks/swift \
            && swift package compute-checksum "$GITHUB_WORKSPACE/$ZIP")"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Stamp manifest, sync sources, commit
        run: |
          set -euo pipefail
          cd dist
          URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$ZIP"
          rm -rf Sources
          mkdir -p Sources
          cp -R ../monorepo/baml_language/sdks/swift/Sources/BamlBridge Sources/BamlBridge
          sed -e "s|__ZIP_URL__|$URL|" \
              -e "s|__CHECKSUM__|${{ steps.checksum.outputs.checksum }}|" \
              -e "s|__SOURCE_SHA__|${{ needs.check.outputs.sha }}|" \
              -e "s|__VERSION__|${{ needs.check.outputs.version }}|" \
              .github/Package.swift.template > Package.swift
          echo "${{ needs.check.outputs.sha }}" > SOURCE_SHA
          swift package dump-package > /dev/null  # manifest sanity check
          git config user.name "baml-swift-publisher"
          git config user.email "noreply@boundaryml.com"
          git add -A
          if git diff --cached --quiet; then
            echo "tree already up to date — nothing to commit"
          else
            git commit -m "publish $TAG from ${SOURCE_REPO}@${{ needs.check.outputs.short }}"
            # A concurrent run (cron vs dispatch) may have pushed the
            # same publish commit first — rebase and retry rather than
            # failing on non-fast-forward; land as no-op if identical.
            for i in 1 2 3; do
              if git push origin HEAD:main; then break; fi
              git fetch origin main
              git rebase origin/main || { git rebase --abort; git reset --hard origin/main; }
              git diff --quiet origin/main && { echo "already published by concurrent run"; break; }
              sleep $((i * 5))
            done
          fi

      - name: Smoke-resolve the published package
        run: |
          set -euo pipefail
          mkdir -p smoke/Sources/Smoke && cd smoke
          cat > Package.swift <<'EOF'
          // swift-tools-version: 6.1
          import PackageDescription
          let package = Package(
              name: "Smoke",
              platforms: [.macOS(.v13)],
              dependencies: [.package(url: "https://github.com/BoundaryML/baml-swift", branch: "main")],
              targets: [.executableTarget(name: "Smoke",
                  dependencies: [.product(name: "BamlBridge", package: "baml-swift")])]
          )
          EOF
          cat > Sources/Smoke/main.swift <<'EOF'
          import BamlBridge
          print("linked BamlBridge OK")
          EOF
          swift build
          BIN=.build/debug/Smoke
          # Re-ad-hoc-sign: runners' AMFI can SIGKILL binaries whose
          # linker-produced ad-hoc signature it dislikes (exit 137).
          codesign --force --sign - "$BIN"
          codesign -dv "$BIN" 2>&1 | head -3
          "$BIN" || { echo "smoke binary exited $? (137 = AMFI kill)"; exit 1; }
